version: '3.8'
services:
  deepseek-api-proxy:
    build: .
    container_name: deepseek-api-proxy
    ports:
      - "8000:8000"
    volumes:
      - ./auth.json:/app/auth.json:ro
      - ./data:/data
    environment:
      - PORT=8000
      - HOST=0.0.0.0
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
